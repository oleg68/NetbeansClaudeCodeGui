# Patterns for detecting interactive prompts in Claude PTY output.
# This is the single source of truth — no defaults exist in code.
#
# Note: backslashes must be doubled in .properties files (Java Properties escaping).
# Unicode escapes (\uXXXX) are interpreted by Properties.load() and need NOT be doubled.

# menu.trigger.pattern — regex matching the first line of a numbered menu.
#   Claude PTY renders the selected option as:  ESC[1C ❯ ESC[1C 1. ESC[1C Yes
#   After ESC[NC cursor-forward sequences are expanded to N spaces this becomes: " ❯ 1. Yes"
#   Special characters:
#     \u276F  — ❯  HEAVY RIGHT-POINTING ANGLE QUOTATION MARK (primary cursor glyph)
#     \u25B6  — ▶  BLACK RIGHT-POINTING TRIANGLE (alternate cursor glyph)
#     >       — plain ASCII greater-than (fallback cursor glyph)
#     \s*     — optional spaces between the cursor glyph and the option number
#               (produced by ESC[1C expansion before the digit)
#     \d+     — one or more digits (option number, e.g. "1")
#     \\.     — literal dot after the number (escaped for regex)
menu.trigger.pattern=^\\s*(\u276F|\u25B6|>)\\s*\\d+\\.

# menu.option.pattern — regex matching subsequent (non-first) numbered options.
#   Example line after ESC[NC expansion: "2. Yes, and always allow access"
#   Special characters:
#     \\s*    — optional leading spaces (ESC[3C before the digit in some renderings)
#     \\d+    — one or more digits (option number)
#     \\.     — literal dot after the number
menu.option.pattern=^\\s*\\d+\\.

# inline.trigger.patterns — comma-separated substrings that identify a single-line
#   yes/no prompt (case-insensitive containment check).
#   Examples of matched lines: "Allow? (y/n)", "Proceed [Y/n]", "Continue (yes/no)"
#   Note: comma is the separator — do not use commas inside individual patterns.
inline.trigger.patterns=? (,[y/n],[y/N],[Y/n],(y/n),(Y/n),(yes/no),[yes/no],[y/n/,(y/n/

# json.subtypes — comma-separated values of the JSON "subtype" field that indicate
#   an interactive prompt delivered as an NDJSON event (lines starting with '{').
#   Matched subtypes cause a PromptRequest with empty options (free-form reply).
json.subtypes=question,permission_request
